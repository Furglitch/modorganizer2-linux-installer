name: Adjust Issue Title

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:

  # Job for new pack requests with game_name
  process-new-pack:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, '[Game]')
    steps:
      - name:  Update new pack title
        uses:  actions/github-script@v9.0.0
        with:
          script:  |
            const body = context.payload.issue.body || '';
            let title = context.payload.issue.title || '';

            if (!title.includes('{{game_name}}')) {
              console.log('No game_name placeholder');
              return;
            }

            const match = body.match(/### Game Title\s*\n\s*(.+)/i);
            if (match && match[1]) {
              const gameName = match[1].trim();
              title = title.replace('{{game_name}}', gameName);

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                title: title
              });
              console.log('Updated title to:', title);
            }
