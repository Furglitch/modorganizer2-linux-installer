name: Build Artifact

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "configs/**"
      - ".pre-commit-config.yaml"
      - ".python-version"
      - "Makefile"
      - "pyproject.toml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "configs/**"
      - ".pre-commit-config.yaml"
      - ".python-version"
      - "Makefile"
      - "pyproject.toml"

permissions:
  contents: read

concurrency:
  group: "build-artifact"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git make wget curl unzip cabextract wine nodejs

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build Artifact
        run: |
          export WINEPREFIX=$HOME/.wine-py
          export WINEARCH=win64
          make _build

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: mo2-lint_artifact
          path: dist/mo2-lint
