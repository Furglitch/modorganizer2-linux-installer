version: 2
updates:

  # Python
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps): "
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci): "
      include: "scope"

  # Ruby (documentation)
  - package-ecosystem: "bundler"
    directory: "/docs"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
